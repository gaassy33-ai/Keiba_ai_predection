<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AI成績・回収率 | 競馬予想AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  max-width: 480px;
  margin: 0 auto;
  padding: 12px;
  font-size: 14px;
}
h1 {
  font-size: 18px;
  padding: 14px 0 4px;
  color: #fff;
  border-bottom: 2px solid #c62828;
  margin-bottom: 14px;
}
h2 {
  font-size: 13px;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 18px 0 8px;
}
.card {
  background: #161b22;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.kpi {
  background: #161b22;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.kpi-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
.kpi-value { font-size: 22px; font-weight: bold; }
.pos { color: #4caf50; }
.neg { color: #ef5350; }
.neutral { color: #64b5f6; }
.chart-wrap { position: relative; height: 200px; margin-top: 4px; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  background: #21262d;
  color: #8b949e;
  font-weight: normal;
  padding: 6px 4px;
  text-align: left;
  font-size: 11px;
}
td {
  padding: 6px 4px;
  border-bottom: 1px solid #21262d;
  vertical-align: middle;
}
td.race-name { color: #8b949e; font-size: 11px; }
td.amount { text-align: right; font-weight: bold; }
.footer {
  color: #484f58;
  font-size: 11px;
  text-align: center;
  margin-top: 20px;
  padding-bottom: 20px;
}
</style>
</head>
<body>

<h1>🏇 AI成績・回収率</h1>

<h2>全期間</h2>
<div class="kpi-grid">
  <div class="kpi">
    <div class="kpi-label">総レース数</div>
    <div class="kpi-value neutral">0<span style="font-size:13px">R</span></div>
  </div>
  <div class="kpi">
    <div class="kpi-label">的中率</div>
    <div class="kpi-value neutral">0.0<span style="font-size:13px">%</span></div>
  </div>
  <div class="kpi">
    <div class="kpi-label">回収率</div>
    <div class="kpi-value neg">0.0<span style="font-size:13px">%</span></div>
  </div>
  <div class="kpi">
    <div class="kpi-label">累計収支</div>
    <div class="kpi-value pos">¥+0</div>
  </div>
</div>

<h2>3月の成績</h2>
<div class="kpi-grid">
  <div class="kpi">
    <div class="kpi-label">的中 / レース数</div>
    <div class="kpi-value neutral">0<span style="font-size:14px">/0R</span></div>
  </div>
  <div class="kpi">
    <div class="kpi-label">月間収支</div>
    <div class="kpi-value pos">¥+0</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">月間回収率</div>
    <div class="kpi-value neg">0.0<span style="font-size:13px">%</span></div>
  </div>
  <div class="kpi">
    <div class="kpi-label">月間的中率</div>
    <div class="kpi-value neutral">0.0<span style="font-size:13px">%</span></div>
  </div>
</div>

<h2>累計収支グラフ</h2>
<div class="card">
  <div class="chart-wrap">
    <canvas id="pnlChart"></canvas>
  </div>
</div>

<h2>最近の予想</h2>
<div class="card" style="padding: 0; overflow: hidden;">
  <table>
    <thead>
      <tr>
        <th>日付</th>
        <th></th>
        <th>レース</th>
        <th>◎本命</th>
        <th style="text-align:right">収支</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="5" style="text-align:center;color:#484f58;padding:20px">まだデータがありません</td></tr>
    </tbody>
  </table>
</div>

<p class="footer">更新: 2026/03/19 ／ AIの予想は参考情報です</p>

<script>
const labels = [];
const data   = [];
const ctx    = document.getElementById('pnlChart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data,
      borderColor: data.length && data[data.length-1] >= 0 ? '#4caf50' : '#ef5350',
      backgroundColor: data.length && data[data.length-1] >= 0
        ? 'rgba(76,175,80,0.08)' : 'rgba(239,83,80,0.08)',
      borderWidth: 2,
      pointRadius: data.length <= 20 ? 4 : 2,
      pointBackgroundColor: '#fff',
      tension: 0.3,
      fill: true,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } },
      y: {
        ticks: {
          color: '#8b949e', font: { size: 10 },
          callback: v => '¥' + v.toLocaleString()
        },
        grid: { color: '#21262d' },
      }
    }
  }
});
</script>
</body>
</html>
