name: 競馬 地方競馬（NAR）平日バッチ

# ============================================================
# cron スケジュール（UTC 表記）
# ============================================================
#  ① 朝バッチ（地方競馬全場・全レース一括予想配信）
#      月〜金 08:00 JST = 月〜金 23:00 UTC (前日)
#
#  ※ 地方競馬は平日（月〜金）に開催される
#  ※ 夜間レースが中心のため朝8時配信
# ============================================================

on:
  schedule:
    # 月〜金 08:00 JST = 前日 23:00 UTC
    - cron: "0 23 * * 0"    # 月 08:00 JST
    - cron: "0 23 * * 1"    # 火 08:00 JST
    - cron: "0 23 * * 2"    # 水 08:00 JST
    - cron: "0 23 * * 3"    # 木 08:00 JST
    - cron: "0 23 * * 4"    # 金 08:00 JST

  # 手動実行（デバッグ・祝日開催など）
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        type: choice
        options: [morning, test]
        default: morning
      date:
        description: "対象日 (YYYY-MM-DD, 空欄=当日JST)"
        type: string
        default: ""


jobs:
  morning_nar:
    name: 地方競馬 朝バッチ（全場・全レース一括配信）
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    concurrency:
      group: keiba-nar-morning
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk && fc-cache -f

      # JST での「今日」を対象日として決定
      - name: Resolve target date (JST)
        id: resolve_date
        env:
          TZ: "Asia/Tokyo"
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          fi

      - name: テスト通知（test モード時のみ・dry-run）
        if: github.event.inputs.mode == 'test'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          SELENIUM_HEADLESS: "true"
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          TZ: "Asia/Tokyo"
        run: |
          python daily_batch.py \
            --date "${{ steps.resolve_date.outputs.date }}" \
            --org nar \
            --dry-run

      - name: 朝バッチ実行（地方競馬 全場・全レース一括予想配信）
        if: github.event.inputs.mode != 'test'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          NAR_TARGET_JYO_CODES: ${{ secrets.NAR_TARGET_JYO_CODES || '30,31,32,34,35,36,37,38,39,40,42,43,44,45' }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          TZ: "Asia/Tokyo"
        run: |
          python daily_batch.py \
            --date "${{ steps.resolve_date.outputs.date }}" \
            --org nar

      - name: 失敗時 LINE エラー通知
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          token   = os.environ["LINE_CHANNEL_ACCESS_TOKEN"]
          user_id = os.environ["LINE_TARGET_USER_ID"]
          requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Content-Type": "application/json",
                       "Authorization": f"Bearer {token}"},
              json={"to": user_id, "messages": [
                  {"type": "text",
                   "text": "⚠️ 地方競馬（NAR）予測バッチが失敗しました。\nGitHub Actions のログを確認してください。"}
              ]}, timeout=10,
          )
          EOF

      - name: Commit & push Pages
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: 地方競馬 朝バッチ 予想ページ更新 [skip ci]"
          git push || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nar-morning-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
