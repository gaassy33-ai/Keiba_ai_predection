name: リッチメニュー セットアップ

on:
  workflow_dispatch:
    inputs:
      action:
        description: "実行アクション"
        type: choice
        options:
          - setup
          - delete
        default: setup

jobs:
  setup:
    name: Rich Menu ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk && fc-cache -f

      - name: Run rich menu ${{ github.event.inputs.action }}
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
        run: python -m src.line.rich_menu ${{ github.event.inputs.action }}
