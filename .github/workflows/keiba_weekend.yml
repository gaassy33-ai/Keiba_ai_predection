name: 競馬 土日限定 統合ワークフロー

# ============================================================
# cron スケジュール（UTC 表記）
# ============================================================
#  ① 朝バッチ（全会場・全レース一括予想配信）
#      土 07:00 JST = 金 22:00 UTC  (DOW=5)
#      日 07:00 JST = 土 22:00 UTC  (DOW=6)
#
#  ② 週末まとめレポート
#      日 17:00 JST = 日 08:00 UTC  (DOW=0)
#
#  ※ 20分前個別通知は廃止。朝7時の一括配信に統合。
# ============================================================

on:
  schedule:
    # ① 朝バッチ（全会場・全レース一括）
    - cron: "0 22 * * 5"    # 金 22:00 UTC = 土 07:00 JST
    - cron: "0 22 * * 6"    # 土 22:00 UTC = 日 07:00 JST

    # ② 週末まとめ
    - cron: "0 8 * * 0"     # 日 08:00 UTC = 日 17:00 JST

  # 手動実行（デバッグ・祝日開催など）
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        type: choice
        options: [morning, summary, test]
        default: morning


# ==================================================================
# ① 朝バッチ（全会場・全レース一括予想 LINE 配信）
#    毎週土日 07:00 JST に実行
#    処理時間目安: ~35〜40 分（timeout-minutes: 60 で余裕あり）
# ==================================================================
jobs:
  morning:
    name: 朝バッチ（全会場・全レース一括配信）
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '0 22 * * 5' || github.event.schedule == '0 22 * * 6'))
      || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'morning' || github.event.inputs.mode == 'test'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    concurrency:
      group: keiba-morning
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 開催日チェックは廃止 ──────────────────────────────────────
      # race.netkeiba.com はJS描画のため urllib.request では race_id を
      # 取得できず常にFalseを返してバッチをスキップしてしまう。
      # cron はすでに土日(DOW=5/6)に限定されているため不要。
      # 非開催日（祝日代替等）は daily_batch.py がスケジュール0件で
      # 自動的にスキップする。

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk && fc-cache -f

      # JST での「今日」を対象日として決定
      - name: Resolve target date (JST)
        id: resolve_date
        env:
          TZ: "Asia/Tokyo"
        run: echo "date=$(date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: テスト通知（test モード時のみ・dry-run）
        if: github.event.inputs.mode == 'test'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          SELENIUM_HEADLESS: "true"
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          TZ: "Asia/Tokyo"
        run: |
          python daily_batch.py \
            --date "${{ steps.resolve_date.outputs.date }}" \
            --dry-run

      - name: 朝バッチ実行（全会場・全レース一括予想配信）
        if: github.event.inputs.mode != 'test'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TARGET_JYO_CODES: ${{ secrets.TARGET_JYO_CODES || '01,02,03,04,05,06,07,08,09,10' }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          TZ: "Asia/Tokyo"
        run: |
          python daily_batch.py \
            --date "${{ steps.resolve_date.outputs.date }}"

      - name: 失敗時 LINE エラー通知
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          token   = os.environ["LINE_CHANNEL_ACCESS_TOKEN"]
          user_id = os.environ["LINE_TARGET_USER_ID"]
          requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Content-Type": "application/json",
                       "Authorization": f"Bearer {token}"},
              json={"to": user_id, "messages": [
                  {"type": "text",
                   "text": "⚠️ 競馬予測バッチが失敗しました。\nGitHub Actions のログを確認してください。"}
              ]}, timeout=10,
          )
          EOF

      - name: Commit & push Pages
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: 朝バッチ 全レース予想ページ更新 [skip ci]"
          git push || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: morning-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7


# ==================================================================
# ② 週末まとめレポート（日曜 17:00 JST）
#    cron: "0 8 * * 0" のみ実行
# ==================================================================
  weekly_summary:
    name: 週末まとめレポート
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 0')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'summary')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    concurrency:
      group: keiba-weekly-summary
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk && fc-cache -f

      - name: 予測結果の取得・stats.html 更新
        env:
          TZ: "Asia/Tokyo"
        run: python -m src.line.update_results

      - name: Commit & push stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/predictions_log.csv docs/stats.html
          git diff --cached --quiet || git commit -m "chore: 週末成績集計 [skip ci]"
          git push || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: summary-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
