name: 週次レース結果収集（モデル固定）

# 毎週月曜 02:00 JST（日曜レース結果が出揃った後）に自動実行
# モデルは再学習しない。特徴量計算用の履歴データのみ更新する。
on:
  schedule:
    - cron: "0 17 * * 0"   # 日 17:00 UTC = 月 02:00 JST
  workflow_dispatch:
    inputs:
      org:
        description: "競馬主催者 (jra / nar)"
        type: choice
        options: [jra, nar]
        default: jra
      start:
        description: "収集開始日 (YYYY-MM-DD, 空=org別デフォルト)"
        default: ""
      end:
        description: "収集終了日 (YYYY-MM-DD, 空=org別デフォルト)"
        default: ""

jobs:
  collect:
    name: レース結果収集 & test_results.csv 更新
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: 必要ディレクトリを作成
        run: mkdir -p data/raw data/processed logs

      - name: レース結果収集
        env:
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
        run: |
          ORG_ARG="--org ${{ github.event.inputs.org || 'jra' }}"
          START_ARG=""
          END_ARG=""
          if [ -n "${{ github.event.inputs.start }}" ]; then
            START_ARG="--start ${{ github.event.inputs.start }}"
          fi
          if [ -n "${{ github.event.inputs.end }}" ]; then
            END_ARG="--end ${{ github.event.inputs.end }}"
          fi
          python collect_weekly.py $ORG_ARG $START_ARG $END_ARG

      - name: 更新データを commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/test_results.csv \
                  data/raw/test_meta.csv    \
                  data/raw/nar_results.csv  \
                  data/raw/nar_meta.csv     || true
          git diff --staged --quiet && echo "No new race data" && exit 0
          git commit -m "data: 週次レース結果追加 $(date +'%Y-%m-%d')"
          git push
