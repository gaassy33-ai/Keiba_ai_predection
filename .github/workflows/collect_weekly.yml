name: 週次レース結果収集（モデル固定）

# 毎週月曜 02:00 JST（日曜レース結果が出揃った後）に自動実行
# モデルは再学習しない。特徴量計算用の履歴データのみ更新する。
on:
  schedule:
    - cron: "0 17 * * 0"   # 日 17:00 UTC = 月 02:00 JST
  workflow_dispatch:
    inputs:
      start:
        description: "収集開始日 (YYYY-MM-DD, 空=org別デフォルト)"
        default: ""
      end:
        description: "収集終了日 (YYYY-MM-DD, 空=org別デフォルト)"
        default: ""

jobs:
  collect:
    name: レース結果収集 & test_results.csv 更新
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: 必要ディレクトリを作成
        run: mkdir -p data/raw data/processed logs

      - name: レース結果収集
        env:
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
        run: |
          START_ARG=""
          END_ARG=""
          if [ -n "${{ github.event.inputs.start }}" ]; then
            START_ARG="--start ${{ github.event.inputs.start }}"
          fi
          if [ -n "${{ github.event.inputs.end }}" ]; then
            END_ARG="--end ${{ github.event.inputs.end }}"
          fi
          python collect_weekly.py --org jra $START_ARG $END_ARG

      - name: feature_stats.pkl を再生成
        env:
          TZ: "Asia/Tokyo"
        run: |
          python - <<'PYEOF'
          import sys
          from pathlib import Path
          import pandas as pd
          sys.path.insert(0, str(Path(".").resolve()))
          from src.features.engineer import FeatureEngineer
          from config.settings import settings

          train_path = Path("data/raw/train_results.csv")
          test_path  = Path("data/raw/test_results.csv")
          train_meta_path = Path("data/raw/train_meta.csv")
          test_meta_path  = Path("data/raw/test_meta.csv")

          if not train_path.exists():
              print("train_results.csv が見つかりません。スキップします。")
              sys.exit(0)

          train_df = pd.read_csv(train_path, dtype=str)
          print(f"train_results: {len(train_df):,} 行")

          # race_date を meta CSV から取得して history に付与（days_since_last_race 用）
          date_map = {}
          for meta_path in (train_meta_path, test_meta_path):
              if meta_path.exists():
                  meta_df = pd.read_csv(meta_path, dtype=str)
                  if "race_date" in meta_df.columns and "race_id" in meta_df.columns:
                      date_map.update(meta_df.set_index("race_id")["race_date"].to_dict())
          if date_map:
              train_df["race_date"] = pd.to_datetime(
                  train_df["race_id"].map(date_map), errors="coerce"
              )
              print(f"race_date 付与: {train_df['race_date'].notna().sum():,} 行")

          fe = FeatureEngineer(train_df)
          fe.precompute_aggregations()

          extra_df = None
          if test_path.exists():
              extra_df = pd.read_csv(test_path, dtype=str)
              if date_map:
                  extra_df["race_date"] = pd.to_datetime(
                      extra_df["race_id"].map(date_map), errors="coerce"
                  )
              print(f"test_results:  {len(extra_df):,} 行")

          fe.save_stats(settings.stats_path, extra_history_df=extra_df)
          print(f"feature_stats.pkl を更新: {settings.stats_path}")
          PYEOF

      - name: 更新データを commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/test_results.csv \
                  data/raw/test_meta.csv    \
                  data/models/feature_stats.pkl || true
          git diff --staged --quiet && echo "No new race data" && exit 0
          git commit -m "data: 週次レース結果追加 & feature_stats 更新 $(date +'%Y-%m-%d')"
          git push
