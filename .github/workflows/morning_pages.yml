name: 朝7時 メインレース予想ページ更新

on:
  # 土日 07:00 JST = UTC 前日 22:00
  schedule:
    - cron: "0 22 * * 5"   # 金 22:00 UTC = 土 07:00 JST
    - cron: "0 22 * * 6"   # 土 22:00 UTC = 日 07:00 JST
  # 手動実行（テスト用）
  workflow_dispatch:

jobs:
  update-pages:
    name: メインレース予想ページ生成
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk && fc-cache -f

      - name: Generate morning pages
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
        run: python -m src.scheduler.runner --morning

      - name: Commit & push updated Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: 朝7時 メインレース予想ページ更新 [skip ci]"
          git push

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: morning-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
