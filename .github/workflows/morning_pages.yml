name: 朝7時 メインレース予想ページ更新

# ──────────────────────────────────────────────────────────────────────
# ⚠️  スケジュール実行は廃止 (2026-04-18)
#
# 理由: keiba_weekend.yml の朝バッチ (cron: "0 22 * * 5/6") と同時刻に
#       実行されていたため、git push が競合しワークフローが失敗していた。
#       全レース一括配信は keiba_weekend.yml が担当するため、このワークフ
#       ローのスケジュール実行は不要。
#
# 手動実行 (workflow_dispatch) のみ残す（デバッグ・テスト用）。
# ──────────────────────────────────────────────────────────────────────

on:
  # 手動実行（テスト・デバッグ用のみ）
  workflow_dispatch:

jobs:
  update-pages:
    name: メインレース予想ページ生成
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    # keiba_weekend.yml の朝バッチと競合しないよう concurrency グループを共有
    concurrency:
      group: keiba-morning
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk && fc-cache -f

      - name: Generate morning pages
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: python -m src.scheduler.runner --morning

      - name: Commit & push updated Pages
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: 朝7時 メインレース予想ページ更新 [skip ci]"
          git pull --rebase origin main
          git push || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: morning-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
