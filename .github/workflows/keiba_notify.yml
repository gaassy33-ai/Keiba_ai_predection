name: 競馬予想 LINE 通知

on:
  # 土日の発走時間帯（JST 09:00〜17:00）を 20 分おきに実行
  # UTC = JST - 9h
  schedule:
    - cron: "0,20,40 23 * * 5"      # 金 23:xx UTC = 土 08:xx JST
    - cron: "0,20,40 0-7 * * 6"     # 土 00-07 UTC = 土 09-16 JST
    - cron: "0,20,40 23 * * 6"      # 土 23:xx UTC = 日 08:xx JST
    - cron: "0,20,40 0-7 * * 0"     # 日 00-07 UTC = 日 09-16 JST
  # 手動実行（デバッグ・祝日開催時など）
  workflow_dispatch:
    inputs:
      test_mode:
        description: "テスト通知を送る（LINE 接続確認用）"
        type: boolean
        default: false

jobs:
  notify:
    name: 予想 & LINE 送信
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Run prediction pipeline
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python -m src.scheduler.runner --test
          else
            python -m src.scheduler.runner --once
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
