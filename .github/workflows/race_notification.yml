name: Race Notification (20-min before)
# このワークフローは keiba_notify.yml に統合されました。
# スケジュール実行は keiba_notify.yml が担当します。
# 手動実行（テスト用）のみ残します。

on:
  workflow_dispatch:
    inputs:
      target_race_id:
        description: "特定のレースIDを指定（空の場合は自動検出）"
        required: false
        default: ""

jobs:
  notify:
    name: Run prediction pipeline (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run notification pipeline
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: python -m src.scheduler.runner --once

      - name: Commit & push updated Pages
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update GitHub Pages [skip ci]"
          git push || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
