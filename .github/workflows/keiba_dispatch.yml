name: レース個別通知（CF Worker dispatch）

# ──────────────────────────────────────────────────────────────────────
# このワークフローは Cloudflare Worker から repository_dispatch ではなく
# workflow_dispatch で呼ばれる。race_id を受け取り、そのレースのみ処理する。
#
# トリガー元: workers/dispatcher.js
# 実行頻度:   1レースにつき1回（ポーリング不要）
# タイムアウト: 20分（単一レース分の処理で十分）
# ──────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: "通知対象のレースID（12桁）"
        required: true
        type: string

jobs:
  notify:
    name: レース通知 (${{ github.event.inputs.race_id }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    # 同一 race_id の二重実行を防止
    concurrency:
      group: dispatch-${{ github.event.inputs.race_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk && fc-cache -f

      - name: レース通知実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_TARGET_USER_ID: ${{ secrets.LINE_TARGET_USER_ID }}
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python -m src.scheduler.daily_batch \
            --notify-race "${{ github.event.inputs.race_id }}"

      - name: Commit & push Pages
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: 予想ページ更新 (${{ github.event.inputs.race_id }}) [skip ci]"
          git push || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-logs-${{ github.event.inputs.race_id }}-${{ github.run_id }}
          path: logs/
          retention-days: 7
