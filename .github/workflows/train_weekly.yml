name: モデル週次再学習

on:
  # 毎週月曜 02:00 JST（日曜レース結果が出揃った後）
  schedule:
    - cron: "0 17 * * 0"   # 日 17:00 UTC = 月 02:00 JST
  workflow_dispatch:

jobs:
  train:
    name: データ収集 & 再学習 & モデル push
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最大 6 時間（データ収集を含む）
    permissions:
      contents: write       # モデルファイルの commit & push に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GH_PAT 不要: GITHUB_TOKEN（自動生成）で同一リポジトリへ push 可能
          token: ${{ github.token }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: 必要ディレクトリを作成
        run: mkdir -p data/raw data/processed data/models logs

      - name: 直近 1 年分のデータ収集
        env:
          NETKEIBA_EMAIL: ${{ secrets.NETKEIBA_EMAIL }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          SELENIUM_HEADLESS: "true"
          TZ: "Asia/Tokyo"
        run: |
          # 過去 12 ヶ月のデータを収集（race_id は data/raw/race_ids.csv へ保存・再開可能）
          START_DATE=$(date -d '1 year ago' +'%Y-%m-%d')
          python -m src.collect \
            --start "${START_DATE}" \
            --jyo 05,06,08,09 \
            --ids-file data/raw/race_ids.csv \
            --output data/processed/training.csv

      - name: モデル再学習
        env:
          TZ: "Asia/Tokyo"
        run: |
          python -m src.model.trainer \
            --input data/processed/training.csv

      - name: モデルをリポジトリに commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models/lgbm_model.pkl data/models/feature_stats.pkl
          git diff --staged --quiet && echo "No model changes" && exit 0
          git commit -m "chore: update model $(date +'%Y-%m-%d')"
          git push
