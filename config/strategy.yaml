# ──────────────────────────────────────────────────────────────────────────────
# strategy.yaml  ―  推論戦略パラメータ
#
# このファイルを編集するだけで戦略を変更できます（コード変更不要）。
# ──────────────────────────────────────────────────────────────────────────────

betting:
  # ──────────────────────────────────────────────────────────────────
  # シャドー稼働モード
  #   true の場合、LINE通知（実弾シグナル）を停止し、買い目候補
  #   （フィルター落ちも含む全ペア）を data/logs/shadow_candidates/
  #   にログ出力するのみとする。
  #   2026-06-21: p_model のキャリブレーション崩壊（実的中率の約4.75倍
  #   過大評価）と軸馬飛散率62.6%が判明したため、実弾運用を停止し
  #   このモードへ移行。
  #   2026-06-22: Two-Brain System（PairCalibrator + Gatekeeper）の
  #   main反映・動作確認が完了したため、フラットベットでの実弾運用
  #   （ソフトローンチ）を再開。
  # ──────────────────────────────────────────────────────────────────
  shadow_mode: false

  # 対象コース（リスト形式）
  target_surface:
    - ダート

  # 券種: quinella（馬連）固定
  bet_type: quinella

  # ──────────────────────────────────────────────────────────────────
  # G1特別モード
  #   true の場合、G1レースは target_surface / min_ev_threshold /
  #   axis_max_odds を無視して必ずAI予測を算出・LINE通知する。
  #   買い目は EV降順 top max_bets_per_race 点（= 通常設定に従う）。
  # ──────────────────────────────────────────────────────────────────
  always_predict_g1: true

  # ──────────────────────────────────────────────────────────────────
  # 軸馬流し方式
  #   axis1 = LTR確率 1位、axis2 = LTR確率 2位
  #   partner_top_n: 3位以下から何頭へ流すか
  #     1 + 2×N 組の候補を生成 → EV・オッズ閾値で絞り込み
  # ──────────────────────────────────────────────────────────────────
  partner_top_n: 5

  # ──────────────────────────────────────────────────────────────────
  # 軸馬の信頼性フィルター（NEW）
  #   axis1・axis2 の単勝オッズが axis_max_odds を超えるレースは見送る。
  #   市場が軸馬を低評価（荒れ必至）の場合、AI予測の信頼性も低下するため。
  #   10.0倍 ≈ 単勝「人気上位5頭以内」が軸馬の条件
  # ──────────────────────────────────────────────────────────────────
  axis_max_odds: 10.0

  # EV 閾値
  #   実運用データ（4/25〜5/30, 11日間, 177点）の分析結果:
  #     EV 1.5〜2.0帯: 67点・ROI 39%（損失最大帯）
  #     EV 2.0〜3.0帯: 66点・ROI 67%
  #     EV 3.0〜5.0帯: 36点・ROI 142%（利益帯）
  #   → 2026-05-31 に 1.5 → 2.0 へ引き上げ（実運用データに基づく改善）
  #   → 2026-06-22 に PairCalibrator 導入（P_model 過大評価を補正）に伴い
  #     EV の絶対値スケールが下がったため 2.0 → 1.2 へ引き下げ。
  #     ※ min_p_model_threshold(0.05) が補正後スケールと不整合で
  #       実質的に全ペアを弾いている問題が別途あり、要対応（本文参照）。
  #   → 2026-06-23: 本番パイプライン（evaluate_race）経由の6月バックテスト
  #     （6/6,6/7,6/13,6/14・ダート61R）で「4日間で3点」という投資機会の
  #     極端な枯渇が判明。min_ev_threshold × gatekeeper_threshold の
  #     3×3グリッドサーチで再検証し、目標ボリューム（4日間15〜30点）に
  #     最も近かった EV≥1.05 × GK≥0.35（13点/4日）を採用。
  #     EV<1.0への緩和は「期待値1.0未満は長期的に必ずマイナス」という
  #     投資原則上却下。ボリューム不足は「現市場に妙味のあるレースが
  #     少ない」という健全な signal として受容し、1.2 → 1.05 へ引き下げ。
  min_ev_threshold: 1.05

  # 1レース最大購入点数
  max_bets_per_race: 5

  # 単勝オッズ上限（パートナー候補も対象）
  longshot_odds_max: 30.0

  # 推定馬連オッズ上限（控除率 17.5% 反映）
  #   2026-06-22: PairCalibrator導入後のシビアな確率スケールでは、
  #   低p_modelのペアがEV≥1.2をクリアするために高い推定オッズを要する
  #   ケースが多く、50.0倍キャップが馬連本来のバリューゾーン（高配当帯）
  #   を構造的に切り落としていたため、2026-06-23に150.0へ緩和。
  est_quinella_odds_max: 150.0

  # AI予測馬連確率（P_model）の下限
  #   2026-06-22: PairCalibrator導入によりΣp_model比で約3.7倍縮小
  #   （33.4→9.0）したため、旧スケール基準の0.05は実質的に全ペアを
  #   弾く無効なフィルターになっていた。補正後スケールに合わせて
  #   0.05 → 0.01 に引き下げ（min_ev_threshold側を実質的な閾値とする）。
  min_p_model_threshold: 0.01

  # ──────────────────────────────────────────────────────────────────
  # Two-Brain System: Gatekeeper（軸馬適性判定）の棄却閾値
  #   P_axis_safe（3着以内に入る確率、市場情報込みで判定）がこの値未満の
  #   軸馬を棄却する。axis_max_odds とは独立に併用（防御の多層化）。
  #   gatekeeper_model.pkl が存在しない間は無効（フィルターなし）。
  #   2026-06-23: 0.50 では軸馬の53.4%を棄却（回避成功率63.5%は健全だが
  #   ボリューム枯渇の主因の一つ）。グリッドサーチの結果、min_ev_threshold
  #   との組み合わせで目標ボリュームに最も近かった 0.35 へ緩和。
  # ──────────────────────────────────────────────────────────────────
  gatekeeper_threshold: 0.35

model:
  ltr_model_path: data/models/lgbm_ltr_model.pkl
  stats_path: data/models/feature_stats.pkl
  gatekeeper_model_path: data/models/gatekeeper_model.pkl
  pair_calibrator_path: data/models/pair_calibrator.pkl
